kind = "web"
previewPath = "/"
title = "PawKeeper - Pet Care App"
version = "1.0.0"
id = "artifacts/pet-care"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23003

[services.development]
run = "pnpm --filter @workspace/pet-care run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pet-care", "run", "build" ]
publicDir = "artifacts/pet-care/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23003"
BASE_PATH = "/"
