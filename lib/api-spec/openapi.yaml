            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyInfo"

  # Upcoming Events (wow endpoint)
  /pets/{petId}/upcoming:
    get:
      operationId: getUpcomingEvents
      tags: [dashboard]
      summary: Get upcoming events for a pet (vet appointments, vaccination due dates, grooming)
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingEvent"

  # Low stock supplies (wow endpoint)
  /pets/{petId}/supplies/low-stock:
    get:
      operationId: getLowStockSupplies
      tags: [supplies]
      summary: Get low-stock supplies for a pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Low stock supplies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supply"

