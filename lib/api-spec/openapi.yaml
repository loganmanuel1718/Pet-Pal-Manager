  # Notes / Behavior Log
  /pets/{petId}/notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List behavior and health notes for a pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a note
      parameters:
