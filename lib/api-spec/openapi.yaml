openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PawKeeper - Pet Care Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pets
    description: Pet profile operations
  - name: feeding
    description: Feeding schedule operations
  - name: medications
    description: Medication reminder operations
  - name: walks
    description: Walk and exercise tracking
  - name: grooming
    description: Grooming schedule operations
  - name: vet
    description: Vet appointment operations
  - name: vaccinations
    description: Vaccination record operations
  - name: notes
    description: Behavior and health notes
  - name: weight
    description: Weight and health tracking
  - name: supplies
    description: Pet supplies tracking
  - name: photos
    description: Photo timeline
  - name: checklists
    description: Daily checklist operations
  - name: dashboard
    description: Dashboard summary operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Pets
  /pets:
    get:
      operationId: listPets
      tags: [pets]
      summary: List all pets
      responses:
        "200":
          description: List of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
    post:
      operationId: createPet
      tags: [pets]
      summary: Create a pet profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePetBody"
      responses:
        "201":
          description: Created pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"

  /pets/{petId}:
    get:
      operationId: getPet
      tags: [pets]
      summary: Get pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pet profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    put:
      operationId: updatePet
      tags: [pets]
      summary: Update pet profile
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePetBody"
      responses:
        "200":
          description: Updated pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    delete:
      operationId: deletePet
      tags: [pets]
      summary: Delete pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"

  # Feeding
  /pets/{petId}/feeding:
    get:
      operationId: listFeedingSchedules
      tags: [feeding]
      summary: List feeding schedules for a pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of feeding schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedingSchedule"
    post:
      operationId: createFeedingSchedule
      tags: [feeding]
      summary: Create a feeding schedule
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeedingScheduleBody"
      responses:
        "201":
          description: Created feeding schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedingSchedule"

  /pets/{petId}/feeding/{scheduleId}:
    put:
      operationId: updateFeedingSchedule
      tags: [feeding]
      summary: Update a feeding schedule
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
        - name: scheduleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeedingScheduleBody"
      responses:
        "200":
          description: Updated feeding schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedingSchedule"
    delete:
      operationId: deleteFeedingSchedule
      tags: [feeding]
      summary: Delete a feeding schedule
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
        - name: scheduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"

  /pets/{petId}/feeding/{scheduleId}/complete:
    post:
      operationId: completeFeedingSchedule
      tags: [feeding]
      summary: Mark a feeding as completed for today
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
        - name: scheduleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedingSchedule"

