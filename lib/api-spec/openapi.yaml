          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medication"
    post:
      operationId: createMedication
      tags: [medications]
      summary: Create a medication reminder
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicationBody"
      responses:
        "201":
          description: Created medication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"

  /pets/{petId}/medications/{medicationId}:
    put:
      operationId: updateMedication
      tags: [medications]
      summary: Update a medication
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
        - name: medicationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMedicationBody"
      responses:
        "200":
          description: Updated medication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
    delete:
      operationId: deleteMedication
      tags: [medications]
      summary: Delete a medication
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
        - name: medicationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"

  /pets/{petId}/medications/{medicationId}/given:
    post:
      operationId: markMedicationGiven
      tags: [medications]
      summary: Mark medication as given today
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
        - name: medicationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked given
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"

  # Walks
  /pets/{petId}/walks:
